<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITR Finder Tool</title>
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Small fixes for animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in.fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-in.zoom-in-95 { animation: zoomIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <!-- React will render into this div -->
    <div id="root"></div>

    <!-- The actual React App Code -->
    <script type="text/babel">
        const { useState } = React;

        // --- Inline SVG Icons (Replacing lucide-react) ---
        const ChevronRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>);
        const ArrowLeft = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>);
        const RotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>);
        const FileText = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>);
        const CheckCircle2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></svg>);
        const Info = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);


        // Define the precise definitions for each ITR based on user constraints
        const itrDefinitions = {
            'ITR-1': "For individuals being a resident (other than not ordinarily resident) having total income upto Rs.50 lakh and having Income from Salaries, one house property, other sources (Interest etc.), long-term capital gains under section 112A up to Rs. 1.25 lakh, and agricultural income up to Rs.5 thousand.",
            'ITR-2': "For Individuals and HUFs not having income from profits and gains of business or profession.",
            'ITR-3': "For individuals and HUFs having income from profits and gains of business or profession.",
            'ITR-4': "For Individuals, HUFs and Firms (other than LLP) being a resident having total income upto Rs.50 lakh and having income from business and profession which is computed under sections 44AD, 44ADA or 44AE, and having long-term capital gains under section 112A upto Rs. 1.25 lakh.",
            'ITR-5': "For persons other than- (i) individual, (ii) HUF, (iii) company and (iv) person filing Form ITR-7.",
            'ITR-6': "For Companies other than companies claiming exemption under section 11.",
            'ITR-7': "For persons including companies required to furnish return under sections 139(4A) or 139(4B) or 139(4C) or 139(4D) only."
        };

        // Define the decision tree
        const questionnaire = {
            START: {
                question: "What is the status / entity type of the Taxpayer?",
                options: [
                    { label: "Individual", next: "IND_PGBP" },
                    { label: "HUF (Hindu Undivided Family)", next: "HUF_PGBP" },
                    { label: "Firm (excluding LLP)", next: "FIRM_PRESUMPTIVE" },
                    { label: "LLP, AOP, BOI, Artificial Juridical Person", result: "ITR-5" },
                    { label: "Company", next: "COMP_EXEMPT" },
                    { label: "Trust, Political Party, Research Association", result: "ITR-7" },
                ]
            },
            
            // --- COMPANY BRANCH ---
            COMP_EXEMPT: {
                question: "Is the company claiming exemption under section 11 (Charitable/Religious Trust)?",
                options: [
                    { label: "Yes, claiming exemption u/s 11", result: "ITR-7" },
                    { label: "No, standard company", result: "ITR-6" },
                ]
            },

            // --- FIRM BRANCH ---
            FIRM_PRESUMPTIVE: {
                question: "Are ALL of the following true?\n1. You are a Resident\n2. Total income is up to Rs. 50 Lakhs\n3. You are opting for presumptive taxation (u/s 44AD, 44ADA, 44AE)",
                options: [
                    { label: "Yes, all conditions met", result: "ITR-4" },
                    { label: "No, one or more conditions fail", result: "ITR-5" },
                ]
            },

            // --- HUF BRANCH ---
            HUF_PGBP: {
                question: "Does the HUF have income from Profits and Gains of Business or Profession (PGBP)?",
                options: [
                    { label: "Yes, we have business/profession income", next: "HUF_PRESUMPTIVE" },
                    { label: "No business/profession income", result: "ITR-2" },
                ]
            },
            HUF_PRESUMPTIVE: {
                question: "Are ALL of the following true?\n1. You are a Resident\n2. Total income is up to Rs. 50 Lakhs\n3. You are opting for presumptive taxation (u/s 44AD, 44ADA, 44AE)",
                options: [
                    { label: "Yes, all conditions met", result: "ITR-4" },
                    { label: "No, one or more conditions fail", result: "ITR-3" },
                ]
            },

            // --- INDIVIDUAL BRANCH ---
            IND_PGBP: {
                question: "Do you have income from Profits and Gains of Business or Profession (PGBP)?",
                options: [
                    { label: "Yes, I have business/profession income", next: "IND_PRESUMPTIVE" },
                    { label: "No business/profession income", next: "IND_RESIDENT" },
                ]
            },
            IND_PRESUMPTIVE: {
                question: "Are ALL of the following true?\n1. You are a Resident\n2. Total income is up to Rs. 50 Lakhs\n3. You are opting for presumptive taxation (u/s 44AD, 44ADA, 44AE)",
                options: [
                    { label: "Yes, all conditions met", result: "ITR-4" },
                    { label: "No, one or more conditions fail", result: "ITR-3" },
                ]
            },
            
            // Individual without PGBP filtering for ITR-1 vs ITR-2
            IND_RESIDENT: {
                question: "What is your residential status for the year?",
                options: [
                    { label: "Resident (and Ordinarily Resident)", next: "IND_INCOME_LIMIT" },
                    { label: "Non-Resident (NRI) or Resident but Not Ordinarily Resident (RNOR)", result: "ITR-2" },
                ]
            },
            IND_INCOME_LIMIT: {
                question: "Is your Total Income up to Rs. 50 Lakhs?",
                options: [
                    { label: "Yes, up to Rs. 50 Lakhs", next: "IND_HOUSE_PROP" },
                    { label: "No, it exceeds Rs. 50 Lakhs", result: "ITR-2" },
                ]
            },
            IND_HOUSE_PROP: {
                question: "Do you have income from MORE THAN ONE House Property?",
                options: [
                    { label: "Yes, I have more than one house property", result: "ITR-2" },
                    { label: "No, just one house property (or zero)", next: "IND_AGRI_INCOME" },
                ]
            },
            IND_AGRI_INCOME: {
                question: "Is your Agricultural Income more than Rs. 5,000?",
                options: [
                    { label: "Yes, more than Rs. 5,000", result: "ITR-2" },
                    { label: "No, Rs. 5,000 or less", next: "IND_CAP_GAINS" },
                ]
            },
            IND_CAP_GAINS: {
                question: "Do you have any Capital Gains OTHER THAN Long-Term Capital Gains u/s 112A up to Rs. 1.25 lakh?",
                options: [
                    { label: "Yes, I have other Capital Gains (e.g., Short Term, or LTCG > 1.25L, or Property Sale)", result: "ITR-2" },
                    { label: "No, I have no capital gains (or only LTCG 112A up to 1.25L)", result: "ITR-1" },
                ]
            }
        };

        function App() {
            const [history, setHistory] = useState([]);
            const [currentStep, setCurrentStep] = useState('START');
            const [result, setResult] = useState(null);

            const handleOptionClick = (option) => {
                if (option.result) {
                    setResult(option.result);
                } else if (option.next) {
                    setHistory([...history, currentStep]);
                    setCurrentStep(option.next);
                }
            };

            const handleBack = () => {
                if (result) {
                    setResult(null);
                    return;
                }
                const previousHistory = [...history];
                const previousStep = previousHistory.pop();
                setHistory(previousHistory);
                setCurrentStep(previousStep);
            };

            const handleRestart = () => {
                setHistory([]);
                setCurrentStep('START');
                setResult(null);
            };

            const stepData = questionnaire[currentStep];

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        {/* Header */}
                        <div className="bg-indigo-600 p-6 text-white flex items-center gap-3">
                            <FileText className="w-8 h-8 opacity-90" />
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">ITR Finder Tool</h1>
                                <p className="text-indigo-100 text-sm mt-1">Determine the correct Income Tax Return form instantly</p>
                            </div>
                        </div>

                        <div className="p-6 sm:p-8">
                            
                            {/* Progress / Back Button Area */}
                            <div className="flex justify-between items-center mb-6 h-8">
                                {(history.length > 0 || result) && (
                                    <button 
                                        onClick={handleBack}
                                        className="flex items-center text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors cursor-pointer"
                                    >
                                        <ArrowLeft className="w-4 h-4 mr-1" /> Back
                                    </button>
                                )}
                                {!result && (
                                    <span className="text-xs font-semibold uppercase tracking-wider text-slate-400 ml-auto">
                                        Question {history.length + 1}
                                    </span>
                                )}
                            </div>

                            {/* QUESTIONNAIRE VIEW */}
                            {!result && stepData && (
                                <div className="animate-in fade-in slide-in-from-bottom-4 duration-300">
                                    <h2 className="text-xl sm:text-2xl font-semibold text-slate-800 mb-6 leading-snug whitespace-pre-line">
                                        {stepData.question}
                                    </h2>
                                    
                                    <div className="space-y-3">
                                        {stepData.options.map((option, index) => (
                                            <button
                                                key={index}
                                                onClick={() => handleOptionClick(option)}
                                                className="w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all flex items-center justify-between group cursor-pointer"
                                            >
                                                <span className="font-medium text-slate-700 group-hover:text-indigo-800">
                                                    {option.label}
                                                </span>
                                                <ChevronRight className="w-5 h-5 text-slate-300 group-hover:text-indigo-500 transition-colors" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* RESULT VIEW */}
                            {result && (
                                <div className="animate-in zoom-in-95 duration-300 flex flex-col items-center text-center">
                                    <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-6">
                                        <CheckCircle2 className="w-10 h-10 text-emerald-600" />
                                    </div>
                                    
                                    <h2 className="text-sm font-bold uppercase tracking-widest text-emerald-600 mb-2">
                                        Required Form
                                    </h2>
                                    <div className="text-5xl font-extrabold text-slate-900 mb-6 drop-shadow-sm">
                                        {result}
                                    </div>

                                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 mb-8 w-full text-left flex gap-4">
                                        <Info className="w-6 h-6 text-indigo-500 shrink-0 mt-0.5" />
                                        <div>
                                            <h3 className="text-sm font-semibold text-slate-800 mb-1">Why this form?</h3>
                                            <p className="text-sm text-slate-600 leading-relaxed">
                                                {itrDefinitions[result]}
                                            </p>
                                        </div>
                                    </div>

                                    <button
                                        onClick={handleRestart}
                                        className="flex items-center justify-center gap-2 w-full sm:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors shadow-md shadow-indigo-200 cursor-pointer"
                                    >
                                        <RotateCcw className="w-5 h-5" />
                                        Start Over
                                    </button>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
